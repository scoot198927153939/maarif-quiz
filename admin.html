<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرف - مدرسة المعارف</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 30px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #d9534f;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="file"] {
            padding: 5px;
            background: #f9f9f9;
        }
        button {
            width: 100%;
            background-color: #d9534f;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #c9302c;
        }
        #imagePreview {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            display: none;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        #loadingMessage {
            text-align: center;
            color: #0275d8;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة تحكم المشرف (إضافة أسئلة مع صور)</h2>
    
    <form id="questionForm">
        <div class="form-group">
            <label for="subject">المادة:</label>
            <select id="subject" required>
                <option value="">اختر المادة</option>
                <option value="العلوم">العلوم</option>
                <option value="الرياضيات">الرياضيات</option>
                <option value="العربية">اللغة العربية</option>
                <option value="الفرنسية">اللغة الفرنسية</option>
            </select>
        </div>

        <div class="form-group">
            <label for="questionText">السؤال:</label>
            <textarea id="questionText" rows="3" placeholder="اكتب نص السؤال هنا..." required></textarea>
        </div>

        <div class="form-group">
            <label for="imageFile">صورة السؤال (اختياري من جهازك):</label>
            <input type="file" id="imageFile" accept="image/*" onchange="previewImage(event)">
            <img id="imagePreview" alt="معاينة الصورة">
            <input type="hidden" id="imageBase64">
        </div>

        <div class="form-group">
            <label for="opt1">الخيار الأول:</label>
            <input type="text" id="opt1" required>
        </div>

        <div class="form-group">
            <label for="opt2">الخيار الثاني:</label>
            <input type="text" id="opt2" required>
        </div>

        <div class="form-group">
            <label for="opt3">الخيار الثالث:</label>
            <input type="text" id="opt3" required>
        </div>

        <div class="form-group">
            <label for="opt4">الخيار الرابع:</label>
            <input type="text" id="opt4" required>
        </div>

        <div class="form-group">
            <label for="correctAnswer">الإجابة الصحيحة (يجب أن تطابق أحد الخيارات تماماً):</label>
            <input type="text" id="correctAnswer" required>
        </div>

        <button type="submit" id="submitBtn">حفظ السؤال في النظام</button>
        <div id="loadingMessage">جاري حفظ السؤال في قاعدة البيانات...</div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFoJNP50PW9TXbnBxWpbblTIZ3uXnJJrbUnmJXF3e08qwPzdWrl6IFcdaJbJolEo_OUQ/exec";

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('imageBase64').value = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('questionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingMsg = document.getElementById('loadingMessage');
        
        submitBtn.disabled = true;
        loadingMsg.style.display = 'block';

        const questionData = {
            subject: document.getElementById('subject').value,
            text: document.getElementById('questionText').value,
            image: document.getElementById('imageBase64').value,
            opt1: document.getElementById('opt1').value,
            opt2: document.getElementById('opt2').value,
            opt3: document.getElementById('opt3').value,
            opt4: document.getElementById('opt4').value,
            correct: document.getElementById('correctAnswer').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // تجاوز قيود المتصفح وإرسال البيانات بنجاح
            headers: {
                'Content-Type': 'text/plain;charset=utf-8',
            },
            body: JSON.stringify(questionData)
        })
        .then(() => {
            alert("تم إرسال وحفظ السؤال في قاعدة البيانات بنجاح!");
            document.getElementById('questionForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageBase64').value = '';
        })
        .catch(error => {
            console.error('Error:', error);
            alert("حدث خطأ أثناء الاتصال بقاعدة البيانات.");
        })
        .finally(() => {
            submitBtn.disabled = false;
            loadingMsg.style.display = 'none';
        });
    });
</script>

</body>
</html>
