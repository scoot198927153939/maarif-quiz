<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الاختبار - مدرسة المعارف</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #0284c7; }
        .question-box { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .question-img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 5px; }
        button { background: #10b981; color: white; border: none; padding: 10px 20px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="subjectTitle">جاري تحميل الاختبار...</h2>
    <div id="quizContainer"></div>
    <button id="submitBtn" style="display:none;" onclick="submitQuiz()">إرسال الإجابات</button>
    <h3 id="resultDisplay" style="text-align: center; color: #059669;"></h3>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsD_wRm0IuzUAh3YaE-9vpaHaf5zrltKGc5YhChIFtoYgfAK5CFErHZrAKNTaN2_RWZg/exec";

let subject = localStorage.getItem("selectedSubject");
document.getElementById("subjectTitle").innerText = "اختبار مادة: " + subject;
let questions = [];

fetch(`${SCRIPT_URL}?action=getExams&subject=${encodeURIComponent(subject)}`)
.then(res => res.json())
.then(data => {
    questions = data;
    let html = "";
    if(questions.length === 0) {
        document.getElementById("quizContainer").innerHTML = "<p>لا توجد اختبارات متاحة لهذه المادة حالياً.</p>";
        return;
    }
    questions.forEach((q, index) => {
        let imgTag = q.image ? `<img src="${q.image}" class="question-img" alt="صورة السؤال">` : "";
        html += `<div class="question-box">
            <p><strong>${index+1}. ${q.question}</strong></p>
            ${imgTag}
            ${q.options.map((opt, i) => `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label><br>`).join('')}
        </div>`;
    });
    document.getElementById("quizContainer").innerHTML = html;
    document.getElementById("submitBtn").style.display = "block";
});

function submitQuiz() {
    let score = 0;
    questions.forEach((q, index) => {
        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        if(selected && selected.value.trim() === q.correct.trim()) {
            score++;
        }
    });

    let username = localStorage.getItem("username") || "طالب ضيف";
    
    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "saveResult", username: username, subject: subject, score: score, total: questions.length })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("quizContainer").innerHTML = "";
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("resultDisplay").innerText = `انتهى الاختبار! نتيجتك هي: ${score} من ${questions.length}`;
    });
}
</script>
</body>
</html>
